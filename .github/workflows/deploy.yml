name: deploy

# on:
#   push:
#     branches: [master]
on: workflow_dispatch

# environments
# "PRODUCTION" | "PRERELEASE" | "DEVELOP"

env:
  HOST_USER: "ubuntu"
  APP_DIR: "/home/ubuntu/jf"
  ARTIFACTS_DIR: "/home/ubuntu/jf/artifacts"
  IMAGE_NAME: "jf-bot"
  CONTAINER_NAME: "jf-bot"
  COMPOSE_NAME: "jf-bot-compose.yaml"
  PROJECT_NAME: "jf_bot"

# secrets
# - REMOTE_HOST
# - SSH_KEY
# - SSH_PASSWORD

jobs:
  build-and-upload-image:
    environment: PRODUCTION
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Save and Compress Docker image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Copy image to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ env.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSWORD }}
          source: "${{ env.IMAGE_NAME }}.tar.gz"
          target: ${{ env.ARTIFACTS_DIR }}

  copy-configs:
    environment: PRODUCTION
    runs-on: ubuntu-latest
    needs: build-and-upload-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Docker Compose to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ env.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSWORD }}
          source: ".infra/${{ env.COMPOSE_NAME }}"
          target: ${{ env.APP_DIR }}
          strip_components: 1

  deploy:
    environment: PRODUCTION
    runs-on: ubuntu-latest
    needs: copy-configs
    steps:
      - name: Load image and Restart Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ env.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSWORD }}
          script: |
            docker load < ${{ env.ARTIFACTS_DIR }}/${{ env.IMAGE_NAME }}.tar.gz

            cd ${{ env.APP_DIR }}           

            docker compose -p ${{ env.PROJECT_NAME }} -f ${{ env.COMPOSE_NAME }} down --remove-orphans || true
            docker compose -p ${{ env.PROJECT_NAME }} -f ${{ env.COMPOSE_NAME }} --env-file .env up -d

  clear-after-deploy:
    environment: PRODUCTION
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Clear server after deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ env.HOST_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSWORD }}
          script: |
            rm ${{ env.ARTIFACTS_DIR }}/${{ env.IMAGE_NAME }}.tar.gz
            docker image prune -f
