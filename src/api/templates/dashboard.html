<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Аналітика івенту</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> </head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Дашборд Ярмарку Кар'єри</h2>
        <a href="/users" class="btn btn-primary">👥 База учасників</a>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-dark shadow-sm h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">Всього реєстрацій</h5>
                    <h1 class="display-4 fw-bold">{{ total }}</h1>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100 p-3">
                <h5 class="text-center mb-3">🎓 Університети</h5>
                <canvas id="uniChart"></canvas>
            </div>
        </div>
        
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100 p-3">
                <h5 class="text-center mb-3">📢 Звідки дізналися</h5>
                <canvas id="sourceChart"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
    // Отримуємо дані з Python і перетворюємо їх для JavaScript
    const unisData = {{ unis_stat | tojson | safe }};
    const sourcesData = {{ sources_stat | tojson | safe }};

    // Функція для генерації випадкових красивих кольорів
    const generateColors = (count) => {
        const colors = ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#0dcaf0', '#6f42c1', '#fd7e14', '#20c997'];
        return Array.from({length: count}, (_, i) => colors[i % colors.length]);
    };

    // Малюємо графік університетів
    new Chart(document.getElementById('uniChart'), {
        type: 'doughnut',
        data: {
            labels: unisData.map(item => item._id || 'Не вказано'),
            datasets: [{
                data: unisData.map(item => item.count),
                backgroundColor: generateColors(unisData.length)
            }]
        }
    });

    // Малюємо графік джерел
    new Chart(document.getElementById('sourceChart'), {
        type: 'pie',
        data: {
            labels: sourcesData.map(item => item._id || 'Не вказано'),
            datasets: [{
                data: sourcesData.map(item => item.count),
                backgroundColor: generateColors(sourcesData.length)
            }]
        }
    });
</script>
</body>
</html>
